services:
  db:
    image: postgres:16
    container_name: cloud-balance-db
    environment:
      POSTGRES_USER: cloudbalance
      POSTGRES_PASSWORD: cloudbalance
      POSTGRES_DB: cloudbalance
    ports:
      - "5432:5432"
    volumes:
      - cloud_balance_pg:/var/lib/postgresql/data
  ml:
    build:
      context: ..
      dockerfile: server/ml/Dockerfile
    container_name: cloud-balance-ml
    environment:
      PORT: 8001
    ports:
      - "8001:8001"
volumes:
  cloud_balance_pg:
